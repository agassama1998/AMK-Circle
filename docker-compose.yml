version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# AMK Circle — Docker Compose
# Spins up the API server + an optional Nginx reverse-proxy for production.
#
# Development:   docker compose up
# Production:    docker compose --profile prod up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API Server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: amkcircle-api
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      NODE_ENV:   "${NODE_ENV:-production}"
      PORT:       "3000"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      DB_PATH:    "/data/amkcircle.db"
    volumes:
      - db_data:/data          # persistent SQLite file
      - backups:/data/backups  # backup exports
    healthcheck:
      test:     ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s
    networks:
      - amk_net

  # ── Nginx Reverse Proxy (production profile) ─────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: amkcircle-nginx
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro  # TLS certs (Let's Encrypt)
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    networks:
      - amk_net

volumes:
  db_data:
    name: amkcircle_db_data
  backups:
    name: amkcircle_backups
  nginx_logs:
    name: amkcircle_nginx_logs

networks:
  amk_net:
    name: amkcircle_network
    driver: bridge
